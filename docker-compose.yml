version: "3.9"

services:

  backend:
    build:
      context: ./app/backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: bureaucracy
    ports:
      - "5468:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: